<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Layout Complexe Colonnes</title>
    <link rel="stylesheet" href="style7.css">
</head>
<body>

    <header class="zone-haut">Zone du Haut</header>

    <div class="triple-colonne">
        
        <aside class="col-bleue">Zone de Gauche</aside>

        <main class="col-centrale">
            <div class="grille-verte">
                <div class="z">Z1</div>
                <div class="z">Z2</div>
                <div class="z">Z3</div>
                <div class="z">Z4</div>
                <div class="z">Z5</div>
            </div>
            <footer class="zone-bas">Zone du bas</footer>
        </main>

        <aside class="col-bleue">Zone de Droite</aside>

    </div>

</body>
</html>
