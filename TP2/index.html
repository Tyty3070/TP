<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Travaux Pratiques</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .tp-grid {
            display: grid;
            gap: 20px;
        }

        .tp-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s;
        }

        .tp-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .tp-info h2 {
            margin: 0;
            font-size: 1.2rem;
        }

        .tp-info p {
            margin: 5px 0 0;
            font-size: 0.9rem;
            color: #64748b;
        }

        .btn-link {
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .btn-link:hover {
            background-color: #1d4ed8;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            font-size: 0.8rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Tableau de bord des TP</h1>
        <p>Retrouvez ici l'ensemble de mes rendus et projets.</p>
    </header>

    <div class="tp-grid">
        <div class="tp-card">
            <div class="tp-info">
                <h2>TP 03 - Introduction au HTML</h2>
            </div>
            <a href="https://tyty3070.github.io/TP/TP3/tp3.html" class="btn-link">Voir le projet</a>
        </div>

        <div class="tp-card">
            <div class="tp-info">
                <h2>TP 04 - TEST</h2>
            </div>
            <a href="https://tyty3070.github.io/TP/TP4/tp4.html" class="btn-link">Voir le projet</a>
        </div>

        </div>

    <footer>
        &copy; 2026 - BERTHEAU Trystan - Étudiant en BTS SIO SISR
    </footer>
</div>

</body>
</html>
